---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    controllers:
      immich:
        strategy: RollingUpdate
        pod:
          # resourceClaims:
          #   - name: gpu
          #     resourceClaimTemplateName: immich-gpu
          annotations:
            reloader.stakater.com/auto: "true"
          # nodeSelector:
          #   kubernetes.io/hostname: "alpha"
          #   node.kubernetes.io/gpu: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: immich-secret
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
            env:
              TZ: Europe/Berlin
              # Config file (from secret, templated by ESO with secrets from 1Password)
              IMMICH_CONFIG_FILE: /config/immich-config.yaml
              # IMMICH_TRUSTED_PROXIES: "10.69.0.0/16,10.96.0.0/16"
              IMMICH_MEDIA_LOCATION: &mediaLocation /library
              # Prevent NFS mount check failures
              IMMICH_IGNORE_MOUNT_CHECK_ERRORS: "true"
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: INIT_POSTGRES_HOST
              REDIS_HOSTNAME: &redisHostname "dragonfly.databases.svc.cluster.local"
              # Isolate Immich data in dedicated Redis DB index
              REDIS_DBINDEX: "1"
              # Explicit ML service URL for resilience
              IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning-proxy.default.svc.cluster.local:8080"
              # IMMICH_TELEMETRY_INCLUDE: "all"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              # claims:
              #   - name: gpu
              requests:
                cpu: 20m
                memory: 212Mi
              limits:
                memory: 8Gi
      machine-learning:
        strategy: RollingUpdate
        pod:
          # resourceClaims:
          #   - name: gpu
          #     resourceClaimTemplateName: immich-gpu
          annotations:
            reloader.stakater.com/auto: "true"
          # nodeSelector:
          #   kubernetes.io/hostname: "alpha"
          #   node.kubernetes.io/gpu: "true"
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              # Using CPU version - OpenVINO has compatibility issues with some iGPUs
              tag: v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3
            env:
              TZ: Europe/Berlin
              REDIS_HOSTNAME: *redisHostname
              REDIS_DBINDEX: "1"
              MPLCONFIGDIR: "/cache/matplotlib"
              # ML cache folder paths
              MACHINE_LEARNING_CACHE_FOLDER: "/cache"
              TRANSFORMERS_CACHE: "/cache"
              # Preload models on startup for faster first requests
              MACHINE_LEARNING_PRELOAD__CLIP: "ViT-B-32__openai"
              MACHINE_LEARNING_PRELOAD__FACIAL_RECOGNITION: "buffalo_l"
              IMMICH_MEDIA_LOCATION: *mediaLocation
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              # claims:
              #   - name: gpu
              requests:
                cpu: 80m
                memory: 212Mi
              limits:
                memory: 8Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &mlPort 3003
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *mlPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 60
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [44, 10000]
        seccompProfile: { type: RuntimeDefault }

    service:
      immich:
        controller: immich
        ports:
          http:
            port: &port 2283
          metrics-api:
            port: 8081
          metrics-ms:
            port: 8082
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: *mlPort
      ml-proxy:
        controller: ml-proxy
      spec:
        controller: ml-proxy
        type: ExternalName
        externalName: keda-add-ons-http-interceptor-proxy.observability.svc.cluster.local
        ports:
          http:
            port: 8080
    serviceMonitor:
      immich:
        enabled: true
        serviceName: immich
        endpoints:
          - port: metrics-api
            scheme: http
            path: /metrics
          - port: metrics-ms
            scheme: http
            path: /metrics
    route:
      app:
        hostnames: ["memories.harissaeed.com"]
        parentRefs:
          - name: envoy-tailscale
            namespace: network
            sectionName: https
        rules:
          # - backendRefs:
          #     - name: immich
          #       port: *port
          - backendRefs:
              - name: keda-add-ons-http-interceptor-proxy
                namespace: observability
                port: 8080
    persistence:
      config:
        type: secret
        name: immich-config
        advancedMounts:
          immich:
            main:
              - path: /config/immich-config.yaml
                subPath: immich-config.yaml
                readOnly: true
      matplotlib:
        type: emptyDir
        advancedMounts:
          immich:
            main:
              - path: /config/matplotlib
      library:
        type: nfs
        server: expanse.internal
        path: /mnt/storage/k8s/immich
        globalMounts:
          - path: *mediaLocation
      cache:
        existingClaim: "{{ .Release.Name }}-cache"
        advancedMounts:
          machine-learning:
            main:
              - path: /cache
                subPath: cache
              - path: /.cache
                subPath: dotCache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      tmpfs:
        type: emptyDir
        advancedMounts:
          immich:
            main:
              - path: /usr/src/app/.reverse-geocoding-dump
                subPath: geocoding
              - path: /usr/src/app/.transformers_cache
                subPath: transformers
