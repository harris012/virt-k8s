---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: immich
spec:
  scaleTargetRef:
    name: immich
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 300
  triggers:
    - type: external-push
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.observability:9090
        interceptorRoute: immich-interceptor-route


