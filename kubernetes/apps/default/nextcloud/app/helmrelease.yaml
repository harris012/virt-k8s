---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nextcloud
spec:
  timeout: 15m
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: nextcloud

  values:
    image:
      flavor: fpm-alpine
      # renovate: datasource=docker depName=nextcloud
      tag: 33.0.5-fpm-alpine@sha256:c20674025d810e35d1b2e4b475e6600be8c6d601fd97a915ce8d3fcdc2142ea2
    nginx:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 66Mi
        limits:
          memory: 192Mi

    phpClientHttpsFix:
      enabled: true
      protocol: https

    nextcloud:
      # extraInitContainers:
      #   - name: init-db
      #     image: ghcr.io/home-operations/postgres-init:18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
      #     envFrom:
      #       - secretRef:
      #           name: nextcloud-secret

      extraEnv:
        - name: REDIS_HOST
          value: dragonfly.databases.svc.cluster.local.
        - name: REDIS_HOST_PORT
          value: "6379"
        - name: PHP_MEMORY_LIMIT
          value: "11G"
        - name: PHP_UPLOAD_LIMIT
          value: "10G"
        - name: PHP_POST_MAX_SIZE
          value: "10G"

      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: ADMIN_USER
        passwordKey: ADMIN_PASS
        # smtpUsernameKey: SMTP_USERNAME
        # smtpPasswordKey: SMTP_PASSWORD
        # smtpHostKey: SMTP_HOST

      host: cloud.harissaeed.com
      datadir: /var/www/data

      # securityContext:
      #   runAsUser: 1000
      #   runAsGroup: 1000
      #   runAsNonRoot: true
      #   readOnlyRootFilesystem: false
      # podSecurityContext:
      #   fsGroup: 1000
      #   runAsUser: 1000
      #   runAsGroup: 1000
      #   runAsNonRoot: true

      # mail:
      #   enabled: true
      #   fromAddress: cloud
      #   domain: ${SECRET_DOMAIN}
      #   smtp:
      #     host: smtp.migadu.com
      #     port: 465
      #     authtype: LOGIN
      #     secure: ssl

      lifecycle:
        postStartCommand:
          - "/bin/sh"
          - "-c"
          - |
            su -s /bin/sh www-data -c 'php occ db:add-missing-indices' || true
            su -s /bin/sh www-data -c 'php occ maintenance:repair --include-expensive' || true

      configs:
        logging.config.php: |-
          <?php
          $CONFIG = array (
            'log_type' => 'file',
            'logfile' => 'nextcloud.log',
            'loglevel' => 1,
            'logdateformat' => 'F d, Y H:i:s'
            );
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '10.96.0.0/16',
              2 => '10.69.0.0/16',
            ),
            'trusted_domains' => array(
              0 => '127.0.0.1',
              1 => 'cloud.harissaeed.com',
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
          ); ?>
        ingress.config.php: |-
          <?php
          $CONFIG = array (
            'overwrite.cli.url' => 'https://cloud.harissaeed.com',
            'overwriteprotocol' => 'https',
          );
        misc.config.php: |-
          <?php
          $CONFIG = array (
            'default_phone_region' => 'DE',
          );
      hooks:
      #  post-installation: |-
      #    printf "Add missing DB indices\n"
      #    php occ db:add-missing-indices
        before-starting: |-
          # disable unneceserry apps
          for appname in activity circles systemtags federation privacy \
              nextcloud_announcements announcementcenter support survey_client \
              user_status weather_status dashboard app_api
            do
            php occ app:disable "$appname"
          done
      #  post-upgrade: |-
      #    php occ maintenance:repair --include-expensive
      #    php occ db:add-missing-indices
      #    php occ db:add-missing-columns
      #    php occ db:add-missing-primary-keys

      # Sidecar: Notify Push (high-performance notifications)
      # How to Enable
      # 1. Install "client push" app within nextcloud
      # 2. sudo -u www-data php -d memory_limit=-1 /var/www/html/occ notify_push:setup https://nextcloud.mydomain.com/push
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        hostKey: INIT_POSTGRES_HOST
        databaseKey: INIT_POSTGRES_DBNAME
        usernameKey: INIT_POSTGRES_USER
        passwordKey: INIT_POSTGRES_PASS

    ingress:
      enabled: false

    persistence:
      enabled: true
      existingClaim: *app
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data  # NFS (user files)
        accessMode: ReadWriteMany

    cronjob:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 96Mi
        limits:
          memory: 192Mi

    startupProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1

    resources:
      requests:
        cpu: 50m
        memory: 212Mi
      limits:
        memory: 8Gi
