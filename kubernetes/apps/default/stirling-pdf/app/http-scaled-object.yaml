---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/http.keda.sh/httpscaledobject_v1alpha1.json
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: stirling-pdf-webui
spec:
  hosts:
    - garage.${CLUSTER_DOMAIN}
  scaleTargetRef:
    name: stirling-pdf-webui
    service: stirling-pdf-webui
    port: 3909
  scalingMetric:
    requestRate:
      granularity: 1s
  scaledownPeriod: 300
  replicas:
    min: 0
    max: 1
