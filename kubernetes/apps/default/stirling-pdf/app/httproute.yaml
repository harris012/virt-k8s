apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stirling-pdf-route
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  hostnames:
    - pdftools.harissaeed.com
  rules:
    - backendRefs:
        - name: keda-add-ons-http-interceptor-proxy
          namespace: default
          port: 8081
