---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vaultwarden
spec:
  components:
    - ../../../../components/volsync
    - ../../../../components/http-scale-to-zero
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/default/vaultwarden/app
  postBuild:
    substitute:
      APP: vaultwarden
      VOLSYNC_CAPACITY: 400Mi
      APP_HOSTNAME: vault
      APP_PORT: 80
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
