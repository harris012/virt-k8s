---
apiVersion: http.keda.sh/v1beta1
kind: InterceptorRoute
metadata:
  name: ${APP}-interceptor-route
spec:
  target:
    service: ${APP}
    port: ${APP_PORT}
  rules:
    - hosts:
        - ${APP_HOSTNAME}.harissaeed.com
  scalingMetric:
    concurrency:
      targetValue: 100
  timeouts:
    request: ${HTTP_TIMEOUT_REQUEST:=180s}
    responseHeader: ${HTTP_TIMEOUT_HEADER:=30s}
    readiness: ${HTTP_TIMEOUT_READINESS:=120s}

